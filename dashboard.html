<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KIB Dashboard</title>
<link rel="stylesheet" href="dashboard.css"/>
</head>

<body>

<main class="app">

<!-- ================= TOP BAR ================= -->
<header class="topbar">
  <button id="menuBtn" aria-label="Open Menu">☰</button>

  <div class="user">
    <div class="avatar" id="avatar"></div>
    <div>
      <div class="hello">Hello</div>
      <div class="name">Mr Kim Dae Hyun</div>
    </div>
  </div>

  <button id="notifBtn" aria-label="Notifications">🔔</button>
</header>

<!-- ================= ACCOUNT CARD ================= -->
<section class="card-wrap">
  <div class="card">

    <div class="card-header">
      <span>Multi-Currency Savings Account</span>
      <span id="cardDate">04 May 2026</span>
    </div>

    <div class="acct">IBAN: IT60X0542****3456</div>
    <div class="acct-sub">SWIFT/BIC: BCITITMM</div>

    <!-- SLIDER -->
    <div class="slider" id="slider">

      <div class="slide" data-currency="EUR">
        <div class="amount">€749,700.00</div>
        <div class="label">Total Balance (EUR)</div>
      </div>

      <div class="slide active" data-currency="USD">
        <div class="amount">$882,000.00</div>
        <div class="label">Total Balance (USD)</div>
      </div>

      <div class="slide" data-currency="KRW">
        <div class="amount">₩1,299,186,000</div>
        <div class="label">Total Balance (KRW)</div>
      </div>

    </div>

    <!-- DOTS -->
    <div class="dots" id="dots">
      <span class="dot"></span>
      <span class="dot active"></span>
      <span class="dot"></span>
    </div>

    <!-- STATUS -->
    <div class="status">
      🔒 Restricted — Under Italian Administrative Authority (ADM)
    </div>

  </div>
</section>

<!-- ================= TRANSACTIONS ================= -->
<section class="transactions">
  <div class="tx-header">
    <h3>Recent Transactions</h3>
    <button id="viewAllTx">View all →</button>
  </div>

  <div id="txList" class="tx-list"></div>
</section>

<!-- ================= ACTION BUTTONS ================= -->
<section class="actions">
  <button id="transferBtn">⇄ Transfer</button>
  <button id="scanBtn">📷 Scan</button>
  <button id="cardsBtn">💳 Cards</button>
  <button id="cashoutBtn">🏧 Cash-Out</button>
</section>

</main>

<!-- ================= BOTTOM NAV ================= -->
<nav class="bottom-nav">
  <button class="active">🏠<span>Home</span></button>
  <button>📊<span>Assets</span></button>
  <button>🏦<span>Bank</span></button>
  <button>💳<span>Cards</span></button>
  <button>⋯<span>More</span></button>
</nav>

<!-- ================= GLOBAL POPUP ================= -->
<div id="popup" class="popup" hidden>
  <!-- JS will inject content here -->
</div>

<!-- ================= DRAWER ================= -->
<div id="drawerBackdrop" hidden></div>

<aside id="drawer" class="drawer">
  <button id="closeDrawer">✕</button>

  <button id="profileBtn">Profile</button>
  <button id="drawerCardsBtn">Cards</button>
  <button disabled>Transfers</button>
  <button id="supportBtn">Support</button>
  <button id="logoutBtn">Logout</button>
</aside>

<!-- ================= SCRIPT ================= -->
<script src="dashboard.js"></script>

</body>
</html>
