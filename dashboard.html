<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KIB Dashboard</title>
<link rel="stylesheet" href="dashboard.css?v=8"/>
</head>

<body>

<main class="app">

<!-- ================= TOP BAR ================= -->
<header class="topbar">
  <button onclick="openDrawer()">☰</button>

  <div class="user">
    <img id="avatar" class="avatar" src="https://i.imgur.com/6VBx3io.png"/>
    <input type="file" id="avatarInput" hidden />
    <div>
      <div class="hello">Hello</div>
      <div class="name">Mr Kim Dae Hyun</div>
    </div>
  </div>

  <!-- ✅ WORKS WITHOUT JS -->
  <button onclick="openPopup('Account Restricted')">🔔</button>
</header>

<!-- ================= ACCOUNT ================= -->
<section class="card-wrap">
  <div class="card">

    <div class="card-header">
      <span>Multi-Currency Account</span>
      <button onclick="toggleFallback()">👁</button>
    </div>

    <div class="acct">IBAN: IT60X0542****3456</div>

    <!-- SLIDER -->
    <div class="slider" id="slider">

      <div class="slide" data-currency="EUR">
        <div class="amount">€749,700.00</div>
        <div class="label">EUR</div>
      </div>

      <div class="slide" data-currency="USD">
        <div class="amount">$882,000.00</div>
        <div class="label">USD</div>
      </div>

      <div class="slide" data-currency="KRW">
        <div class="amount">₩1,299,186,000</div>
        <div class="label">KRW</div>
      </div>

    </div>

    <div class="dots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <!-- FX fallback -->
    <div class="fx-box">
      ≈ $882,000.00
    </div>

  </div>
</section>

<!-- ================= TRANSACTIONS ================= -->
<section class="transactions">

  <div class="tx-header">
    <h3>Transactions</h3>

    <!-- ✅ fallback -->
    <button onclick="document.getElementById('allTx').hidden=false">
      View all →
    </button>
  </div>

  <div id="txList">
    <div class="tx">
      <div>Incoming SWIFT</div>
      <div class="credit">+$882,000</div>
    </div>
  </div>

</section>

<!-- ================= ACTIONS ================= -->
<section class="actions">

  <button onclick="openPopup('Transfer Restricted')">⇄ Transfer</button>

  <!-- fallback scan -->
  <button onclick="openPopup('Scan not available')">📷 Scan</button>

  <!-- fallback cards -->
  <button onclick="document.getElementById('cardsScreen').hidden=false">
    💳 Cards
  </button>

  <button onclick="openPopup('Cash-Out disabled')">🏧 Cash-Out</button>

</section>

</main>

<!-- ================= NAV ================= -->
<nav class="bottom-nav">
  <button class="active">🏠</button>
  <button>📊</button>
  <button>🏦</button>
  <button>💳</button>
</nav>

<!-- ================= POPUP ================= -->
<div id="popup" class="popup" hidden>
  <div class="popup-box">
    <h3 id="popupText">Notice</h3>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<!-- ================= VIEW ALL ================= -->
<div id="allTx" class="popup" hidden>
  <div class="popup-box">
    <h3>All Transactions</h3>

    <div class="tx">
      <div>Incoming SWIFT</div>
      <div class="credit">+$882,000</div>
    </div>

    <button onclick="this.closest('.popup').hidden=true">Close</button>
  </div>
</div>

<!-- ================= CARDS ================= -->
<div id="cardsScreen" class="popup" hidden>
  <div class="popup-box">
    <h3>Card</h3>
    <p>**** **** **** 3456</p>
    <button onclick="this.closest('.popup').hidden=true">Close</button>
  </div>
</div>

<!-- ================= DRAWER ================= -->
<div id="drawerBackdrop" hidden onclick="closeDrawer()"></div>

<aside id="drawer" class="drawer">

  <button onclick="openPopup('Profile')">Profile</button>
  <button onclick="openPopup('Cards')">Cards</button>
  <button onclick="openPopup('Support')">Support</button>

  <button onclick="closeDrawer()">Close</button>

</aside>

<!-- ================= FALLBACK JS ================= -->
<script>

/* ===== WORKS EVEN IF dashboard.js FAILS ===== */

function openPopup(text){
  document.getElementById("popupText").innerText = text;
  document.getElementById("popup").hidden = false;
}

function closePopup(){
  document.getElementById("popup").hidden = true;
}

function openDrawer(){
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawerBackdrop").hidden = false;
}

function closeDrawer(){
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawerBackdrop").hidden = true;
}

/* basic mask fallback */
let hiddenBal = false;
function toggleFallback(){
  hiddenBal = !hiddenBal;

  document.querySelectorAll(".amount").forEach(el=>{
    el.textContent = hiddenBal ? "••••••" : el.dataset.original || el.textContent;
  });
}

</script>

<!-- MAIN JS -->
<script src="dashboard.js?v=8"></script>

</body>
</html>
