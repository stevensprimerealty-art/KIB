<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KIB Dashboard</title>
<link rel="stylesheet" href="dashboard.css"/>
</head>

<body>

<div class="app">

<!-- TOP BAR -->
<header class="topbar">
  <button onclick="openDrawer()">☰</button>

  <div class="user">
    <input type="file" id="imgPicker" hidden/>
    <img id="profileImg" onclick="pickImage()" src="default.png"/>
    <span>Kim Dae Hyun</span>
  </div>

  <div class="icons">
    <span onclick="showCompliance()">🔔</span>
  </div>
</header>

<!-- CARD SLIDER -->
<section class="cards" id="cardSlider">

  <!-- EUR -->
  <div class="card">
    <h3>EUR Account</h3>
    <p id="eurBalance">€---</p>
    <button onclick="toggleBalance(this)">Hide</button>
  </div>

  <!-- USD -->
  <div class="card flipCard" id="usdCard">
    <h3>USD Account</h3>
    <p id="usdBalance">$882,000</p>
    <button onclick="toggleBalance(this)">Hide</button>
  </div>

  <!-- KRW -->
  <div class="card">
    <h3>KRW Account</h3>
    <p id="krwBalance">₩---</p>
    <button onclick="toggleBalance(this)">Hide</button>
  </div>

</section>

<!-- ACTIONS -->
<section class="actions">
  <button onclick="blocked()">Transfer</button>
  <button onclick="blocked()">Scan QR</button>
</section>

<!-- TRANSACTIONS -->
<section class="transactions">
  <h3>Recent Transactions</h3>

  <div class="tx">
    <div>
      <strong>ADM Italy Deposit</strong>
      <small>04 May 2026</small>
    </div>
    <div class="amount green">+$882,000</div>
  </div>

</section>

</div>

<!-- DRAWER -->
<div class="drawer" id="drawer">
  <div class="drawerContent">
    <img id="drawerImg" src="default.png"/>
    <p>Kim Dae Hyun</p>

    <button>Accounts</button>
    <button>Open Banking</button>
    <button>Exchange</button>
    <button>Funds</button>
    <button>Settings</button>

    <button onclick="logout()">Logout →</button>
  </div>
</div>

<!-- COMPLIANCE MODAL -->
<div class="modal" id="modal">
  <div class="modalBox">
    <h2>Account Restricted</h2>
    <p>
      Funds are under administrative compliance.<br/>
      Transfers and withdrawals are disabled until case closure.
    </p>

    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
