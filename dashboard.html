<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KIB Dashboard</title>
<link rel="stylesheet" href="dashboard.css?v=11"/>
</head>

<body>

<main class="app">

<header class="topbar">
  <button onclick="openDrawer()">☰</button>

  <div class="user">
    <img id="avatar" class="avatar" src="https://i.imgur.com/6VBx3io.png"/>
    <input type="file" id="avatarInput" hidden />
    <div>
      <div class="hello">Hello</div>
      <div class="name">Mr Kim Dae Hyun</div>
    </div>
  </div>

  <!-- ✅ USE SAFE WRAPPER -->
  <button onclick="safeOpenNotifications()">🔔</button>
</header>

<section class="card-wrap">
  <div class="card">

    <div class="card-header">
      <span>Multi-Currency Account</span>
      <button onclick="toggleFallback()">👁</button>
    </div>

    <div class="acct">IBAN: IT60X0542****3456</div>

    <div class="slider" id="slider">

      <div class="slide" data-currency="EUR">
        <div class="amount" data-original="€749,700.00">€749,700.00</div>
        <div class="label">EUR</div>
      </div>

      <div class="slide" data-currency="USD">
        <div class="amount" data-original="$882,000.00">$882,000.00</div>
        <div class="label">USD</div>
      </div>

      <div class="slide" data-currency="KRW">
        <div class="amount" data-original="₩1,299,186,000">₩1,299,186,000</div>
        <div class="label">KRW</div>
      </div>

    </div>

    <div class="dots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div class="fx-box" id="fxValue">≈ $0.00</div>

  </div>
</section>

<section class="transactions">

  <div class="tx-header">
    <h3>Transactions</h3>

    <button onclick="safeViewAll()">View all →</button>
  </div>

  <div id="txList">
    <div class="tx">Loading...</div>
  </div>

</section>

<section class="actions">

  <!-- ✅ SAFE WRAPPER -->
  <button onclick="safeOpenTransfer()">⇄ Transfer</button>

  <button onclick="openPopup('Scan not available')">📷 Scan</button>

  <button onclick="document.getElementById('cardsScreen').hidden=false">
    💳 Cards
  </button>

  <button onclick="openPopup('Cash-Out disabled')">🏧 Cash-Out</button>

</section>

</main>

<nav class="bottom-nav">
  <button class="active">🏠</button>
  <button>📊</button>
  <button>🏦</button>
  <button>💳</button>
</nav>

<!-- POPUP -->
<div id="popup" class="popup" hidden>
  <div class="popup-box">
    <div id="popupText">Notice</div>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<!-- CARDS -->
<div id="cardsScreen" class="popup" hidden>
  <div class="popup-box">
    <h3>Card</h3>
    <p>**** **** **** 3456</p>
    <button onclick="this.closest('.popup').hidden=true">Close</button>
  </div>
</div>

<!-- DRAWER -->
<div id="drawerBackdrop" hidden onclick="closeDrawer()"></div>

<aside id="drawer" class="drawer">
  <button onclick="openPopup('Profile')">Profile</button>
  <button onclick="openPopup('Cards')">Cards</button>
  <button onclick="openPopup('Support')">Support</button>
  <button onclick="closeDrawer()">Close</button>
</aside>

<!-- ================= SAFE GLOBAL WRAPPERS ================= -->
<script>
/* POPUP */
window.openPopup = function(text){
  document.getElementById("popupText").innerHTML = text;
  document.getElementById("popup").hidden = false;
}

window.closePopup = function(){
  document.getElementById("popup").hidden = true;
}

/* DRAWER */
window.openDrawer = function(){
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawerBackdrop").hidden = false;
}

window.closeDrawer = function(){
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawerBackdrop").hidden = true;
}

/* MASK */
let hiddenBal = false;
window.toggleFallback = function(){
  hiddenBal = !hiddenBal;

  document.querySelectorAll(".amount").forEach(el=>{
    el.textContent = hiddenBal ? "••••••" : el.dataset.original;
  });
}

/* SAFE VIEW ALL */
window.safeViewAll = function(){
  if (window.renderTransactions) {
    window.renderTransactions(999);
  } else {
    openPopup("Loading transactions...");
  }
}

/* ✅ SAFE NOTIFICATIONS (NO OVERRIDE) */
window.safeOpenNotifications = function(){
  if (window.openNotifications && window.openNotifications !== window.safeOpenNotifications) {
    window.openNotifications();
  } else {
    openPopup("No notifications yet");
  }
}

/* ✅ SAFE TRANSFER (NO OVERRIDE) */
window.safeOpenTransfer = function(){
  if (window.openTransfer && window.openTransfer !== window.safeOpenTransfer) {
    window.openTransfer();
  } else {
    openPopup("Transfer system loading...");
  }
}
</script>

<!-- MAIN JS -->
<script src="dashboard.js?v=9"></script>

</body>
</html>
