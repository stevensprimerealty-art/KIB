<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KIB Cards</title>
<link rel="stylesheet" href="cards.css"/>
</head>

<body>

<div class="app">

<!-- TOPBAR -->
<header class="topbar">
  <button onclick="history.back()">←</button>
  <h2>Cards</h2>
  <div></div>
</header>

<!-- CARDS -->
<section class="digitalCards">

  <!-- USD CARD -->
  <div class="bankCard primary" onclick="flipCard(this)">
    <div class="cardInner">

      <!-- FRONT -->
      <div class="cardFront">
        <div class="cardTop">
          <span class="bank">KEB Hana Bank</span>
          <div class="right">
            <span class="primaryBadge">Primary</span>
            <span class="type">VISA</span>
          </div>
        </div>

        <div class="chip"></div>

        <div class="cardNumber" data-full="4242424242420001">
          •••• •••• •••• 0001
        </div>

        <div class="cardBottom">
          <div>
            <small>Card Holder</small>
            <p>Kim Dae Hyun</p>
          </div>

          <div>
            <small>Expires</small>
            <p>12/29</p>
          </div>
        </div>
      </div>

      <!-- BACK -->
      <div class="cardBack">
        <div class="stripe"></div>

        <div class="cvvBox">
          <small>CVV</small>
          <div class="cvv">•••</div>
        </div>
      </div>

    </div>
  </div>

  <!-- EUR CARD -->
  <div class="bankCard eur" onclick="flipCard(this)">
    <div class="cardInner">

      <div class="cardFront">
        <div class="cardTop">
          <span class="bank">KEB Hana Bank</span>
          <span class="type">MASTERCARD</span>
        </div>

        <div class="chip"></div>

        <div class="cardNumber" data-full="5555444433338821">
          •••• •••• •••• 8821
        </div>

        <div class="cardBottom">
          <div>
            <small>Card Holder</small>
            <p>Kim Dae Hyun</p>
          </div>

          <div>
            <small>Expires</small>
            <p>11/28</p>
          </div>
        </div>
      </div>

      <div class="cardBack">
        <div class="stripe"></div>

        <div class="cvvBox">
          <small>CVV</small>
          <div class="cvv">•••</div>
        </div>
      </div>

    </div>
  </div>

</section>

</div>

<script src="cards.js"></script>
</body>
</html>
