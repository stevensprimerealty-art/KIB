<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KIB Internet Banking</title>

<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Source Sans 3',sans-serif}

/* HEADER */
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 20px;background:#000;color:#fff;
}

/* HAMBURGER */
.hamburger span{
  display:block;width:25px;height:3px;background:#fff;margin:5px 0;
  transition:.3s;
}

/* DRAWER */
.drawer{
  position:fixed;top:0;right:-320px;width:320px;height:100%;
  background:#fff;transition:.3s;z-index:1000;overflow:auto;
}
.drawer.is-open{right:0}

.drawer-top{
  display:flex;justify-content:space-between;padding:15px;
  border-bottom:1px solid #eee;
}

.drawer-body a{
  display:block;padding:12px;text-decoration:none;color:#000;
}

/* BACKDROP */
.backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:900;
}

/* HERO */
.internet-hero{
  position:relative;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
}

.internet-bg{
  position:absolute;inset:0;
  background:url('internet-banking-hero.PNG') center/cover no-repeat;
}

.internet-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.45);
}

/* LOGIN */
.login-card{
  position:relative;z-index:2;
  background:#fff;padding:25px;border-radius:15px;
  width:320px;display:flex;flex-direction:column;gap:12px;
}

.login-card input{
  padding:10px;border:1px solid #ccc;border-radius:6px;
}

.login-btn{
  padding:12px;background:#000;color:#fff;border:none;
  cursor:pointer;
}

#msg{font-weight:600;font-size:14px}
</style>
</head>

<body>

<!-- HEADER -->
<header class="topbar">
  <div>KOREA INTERNATIONAL BANKING</div>

  <button id="menuBtn" class="hamburger">
    <span></span><span></span><span></span>
  </button>
</header>

<!-- DRAWER -->
<aside id="drawer" class="drawer">
  <div class="drawer-top">
    <strong>MENU</strong>
    <button id="closeBtn">✕</button>
  </div>

  <div class="drawer-body">
    <a href="index.html">Home</a>
    <a href="personal-banking.html">Personal Banking</a>
    <a href="business-banking.html">Business Banking</a>
    <a href="internet-banking.html">Internet Banking</a>
  </div>
</aside>

<div id="backdrop" class="backdrop" hidden></div>

<!-- HERO LOGIN -->
<section class="internet-hero">
  <div class="internet-bg"></div>
  <div class="internet-overlay"></div>

  <form class="login-card" id="loginForm">

    <h3>KIB BANKING ONLINE</h3>

    <input id="email" type="email" placeholder="Email" required>

    <button class="login-btn" type="submit">Login</button>

    <p id="msg"></p>

  </form>
</section>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ===============================
// SUPABASE CONFIG (USE SAME AS MAIN SITE)
// ===============================
const SUPABASE_URL = "https://wkhlshjwpjnhpwcfvdqv.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_UyqL5TtlTGVXVeUGeEseCw_QLaujK2V"; // ✅ use your real key

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY,
  {
    auth:{
      persistSession:true,
      autoRefreshToken:true,
      detectSessionInUrl:true
    }
  }
);

// ===============================
// AUTO REDIRECT IF ALREADY LOGGED IN
// ===============================
(async ()=>{
  const { data } = await supabase.auth.getSession();
  if(data?.session){
    window.location.href = "dashboard.html";
  }
})();

// ===============================
// LOGIN (MAGIC LINK)
// ===============================
document.getElementById("loginForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const msg = document.getElementById("msg");

  if(!email){
    msg.textContent = "Enter your email";
    return;
  }

  msg.textContent = "Sending login link...";

  const { error } = await supabase.auth.signInWithOtp({
    email,
    options:{
      emailRedirectTo: window.location.origin + "/dashboard.html"
    }
  });

  if(error){
    msg.textContent = "❌ " + error.message;
  } else {
    msg.textContent = "✅ Check your email and click the login link";
  }
});

// ===============================
// MENU (MATCHES YOUR MAIN SITE)
// ===============================
const drawer=document.getElementById("drawer");
const backdrop=document.getElementById("backdrop");

document.getElementById("menuBtn").onclick=()=>{
  drawer.classList.add("is-open");
  backdrop.hidden=false;
};

document.getElementById("closeBtn").onclick=closeMenu;
backdrop.onclick=closeMenu;

function closeMenu(){
  drawer.classList.remove("is-open");
  backdrop.hidden=true;
}
</script>

</body>
</html>
