<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KIB — Transactions</title>

  <link rel="stylesheet" href="transactions.css" />
</head>

<body>

  <main class="page">

    <!-- =========================
         TOP BAR
    ========================== -->
    <header class="topbar">

      <!-- Back -->
      <button 
        class="icon-btn" 
        type="button" 
        onclick="history.back()" 
        aria-label="Back"
      >
        ←
      </button>

      <!-- Title -->
      <div class="title">
        <div class="title-en">Transaction Record</div>
        <div class="title-ko">거래 내역</div>
      </div>

      <!-- Hamburger -->
      <button 
        id="menuBtn" 
        class="icon-btn" 
        type="button" 
        aria-label="Open menu"
      >
        ☰
      </button>

    </header>

    <!-- =========================
         TRANSACTIONS LIST
    ========================== -->
    <section 
      id="allTx" 
      class="record-list"
      role="list"
      aria-live="polite"
    ></section>

    <!-- =========================
         EMPTY STATE (optional)
    ========================== -->
    <div id="emptyState" class="empty-state" hidden>
      <div class="empty-title">No Transactions</div>
      <div class="empty-sub">
        Your transaction history will appear here.
      </div>
    </div>

  </main>

  <!-- =========================
       BACKDROP
  ========================== -->
  <div id="menuBackdrop" class="backdrop" hidden></div>

  <!-- =========================
       DRAWER (LEFT MENU)
  ========================== -->
  <aside id="drawer" class="drawer" aria-hidden="true">

    <div class="drawer-top">
      <div class="drawer-title">Menu</div>

      <button 
        id="closeDrawer" 
        class="icon-btn" 
        type="button"
        aria-label="Close menu"
      >
        ✕
      </button>
    </div>

    <div class="drawer-list">

      <button class="drawer-item" type="button">
        Profile
      </button>

      <button 
        class="drawer-item" 
        type="button" 
        onclick="location.href='cards.html'"
      >
        Cards
      </button>

      <button 
        class="drawer-item" 
        type="button" 
        onclick="location.href='transfer.html'"
      >
        Transfer
      </button>

      <button class="drawer-item" type="button">
        Loans
      </button>

      <button class="drawer-item" type="button">
        Support
      </button>

      <button class="drawer-item" type="button">
        Settings
      </button>

      <button 
        id="logoutBtn" 
        class="drawer-item danger" 
        type="button"
      >
        LOG OUT ➡️
      </button>

    </div>

  </aside>

  <!-- =========================
       SCRIPTS
  ========================== -->

  <script defer src="transactions.js"></script>

  <!-- Drawer Logic -->
  <script>
    window.addEventListener("DOMContentLoaded", () => {

      const drawer = document.getElementById("drawer");
      const backdrop = document.getElementById("menuBackdrop");
      const menuBtn = document.getElementById("menuBtn");
      const closeBtn = document.getElementById("closeDrawer");

      function openDrawer() {
        drawer.classList.add("is-open");
        drawer.setAttribute("aria-hidden", "false");

        backdrop.hidden = false;
        requestAnimationFrame(() => backdrop.classList.add("is-on"));

        document.body.style.overflow = "hidden";
      }

      function closeDrawer() {
        drawer.classList.remove("is-open");
        drawer.setAttribute("aria-hidden", "true");

        backdrop.classList.remove("is-on");
        setTimeout(() => backdrop.hidden = true, 220);

        document.body.style.overflow = "";
      }

      menuBtn?.addEventListener("click", openDrawer);
      closeBtn?.addEventListener("click", closeDrawer);
      backdrop?.addEventListener("click", closeDrawer);

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeDrawer();
      });

      // Logout (simple redirect)
      document.getElementById("logoutBtn")?.addEventListener("click", () => {
        localStorage.clear();
        window.location.href = "index.html";
      });

    });
  </script>

</body>
</html>
